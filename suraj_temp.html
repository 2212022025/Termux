<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suraj Bhai Ki Jai Ho</title>
    <!-- Google Fonts for Stylish Hindi Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff4e50;
            --secondary-color: #f9d423;
            --text-color: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind', sans-serif;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            border: 5px solid #ffffff;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Teko', sans-serif;
            font-size: 3.5rem;
            color: #d63031;
            line-height: 1;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .slogan {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 25px;
            display: block;
            border-bottom: 2px dashed #ff4e50;
            padding-bottom: 10px;
        }

        .image-box {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            border: 4px solid #fff;
        }

        .image-box img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s;
        }

        .image-box img:hover {
            transform: scale(1.05);
        }

        .footer-text {
            font-size: 1.4rem;
            font-weight: 700;
            background: #d63031;
            color: white;
            padding: 15px;
            border-radius: 50px;
            display: inline-block;
            width: 100%;
            box-shadow: 0 4px 10px rgba(214, 48, 49, 0.3);
            margin-bottom: 15px;
        }

        .gif-box {
            width: 60%;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
        }

        .gif-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        .emoji {
            font-size: 1.8rem;
            vertical-align: middle;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; }
            .slogan { font-size: 1.2rem; }
            .footer-text { font-size: 1.1rem; }
            .gif-box { width: 80%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Suraj Bhai ki Jai Ho!</h1>
        
        <span class="slogan">
            हमारा नेता कैसा हो, <br> सूरज भाई जैसा हो!
        </span>

        <div class="image-box">
            <img src="https://litter.catbox.moe/5guo5mcwidrnb4az.jpg" alt="Suraj Bhai">
        </div>

        <div class="footer-text">
            🚩 चंद्रकांत नेता की तरफ से <br>
            <strong>हैप्पी सूरज दिवस</strong> 🚩
        </div>

        <div class="gif-box">
            <img src="https://litter.catbox.moe/7kh9q43x1o5grcbk.gif" alt="Celebration GIF">
        </div>
    </div>

</body>
</html>
